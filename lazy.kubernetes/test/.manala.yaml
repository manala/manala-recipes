manala:
    repository: ../..
    recipe: lazy.kubernetes

project:
    name: lazy-kubernetes-test

system:
    locale: en_US.UTF-8
    env:
        TEST: test
    env_file:
        - .env.1
        - path: .env.2
          required: false
        - path: .env.3
          required: false
    tmpfs:
        - /tmpfs
        - /tmpfs/exec:exec
    docker: true
    apt:
        packages:
            - goss
            - nano
    git:
        config: |
            # Git config
    kubectl:
        version: 1.35.2
    kustomize:
        version: 5.8.1
    krew:
        version: 0.5.0
        plugins:
            - ns
    helm:
        version: 4.1.1
        plugins:
            - url: https://github.com/databus23/helm-diff
              version: 3.15.2
              verify: false
    helmfile:
        version: 1.4.1
    k9s:
        version: 0.50.18
    stern:
        version: 1.33.1
    popeye:
        version: 0.22.1
    vault:
        version: 1.21.2
    rclone:
        version: 1.73.1
    openstack:
        version: 9.0.0
    swift:
        version: 4.10.0
        keystone:
            version: 5.8.0
    scw:
        version: 2.52.0
    sops:
        version: 3.12.1
    aws:
        version: 2.34.1
        config: |
            [profile test]
    gcloud:
        version: 559.0.0
        components:
            - gke-gcloud-auth-plugin
    age:
        version: 1.3.1
    argocd:
        version: 3.3.2
