manala:
    repository: ../..
    recipe: lazy.ansible

project:
    name: lazy-ansible-test

system:
    locale: en_US.UTF-8
    env:
        TEST: test
    env_file:
        - fixtures/.env.1
        - path: fixtures/.env.2
        - path: fixtures/.env.3
          required: false
    mount:
        - fixtures/mount_relative
        - fixtures/mount_native:/fixtures/mount_native
    tmpfs:
        - /tmpfs
        - /tmpfs/exec:exec
    docker: true
    apt:
        packages:
            - goss
            - nano
    git:
        config: |
            # Git config
    ssh:
        config: |
            # Ssh config
    ansible:
        version: 2.19.7
        config: |
            # Ansible config
        dependencies:
            - hvac==2.4.0
    ansible-lint:
        version: 26.2.0
        dependencies:
            - pytest==9.0.2
    ansible-creator:
        version: 26.2.0
    molecule:
        version: 26.2.0
        dependencies:
            - molecule-plugins==25.8.12
            - molecule-plugins[docker]==25.8.12
    terraform:
        version: 1.13.5
    aws:
        version: 2.34.1
        config: |
            [profile test]
    gcloud:
        version: 559.0.0
        components:
            - gke-gcloud-auth-plugin
