manala:
    repository: ../..
    recipe: lazy.ops

project:
    name: lazy-ops-test

system:
    locale: en_US.UTF-8
    env:
        TEST: test
    env_file:
        - fixtures/.env.1
        - path: fixtures/.env.2
        - path: fixtures/.env.3
          required: false
    mount:
        - fixtures/mount_relative
        - fixtures/mount_native:/fixtures/mount_native
    tmpfs:
        - /tmpfs
        - /tmpfs/exec:exec
    docker: true
    apt:
        packages:
            - goss
            - nano
    git:
        config: |
            # Git config
    ssh:
        config: |
            # Ssh config
    ansible:
        version: 2.19.7
        config: |
            # Ansible config
        dependencies:
            - hvac==2.4.0
    ansible-lint:
        version: 26.2.0
        dependencies:
            - pytest==9.0.2
    ansible-creator:
        version: 26.2.0
    molecule:
        version: 26.2.0
        dependencies:
            - molecule-plugins==25.8.12
            - molecule-plugins[docker]==25.8.12
    terraform:
        version: 1.13.5
    kubectl:
        version: 1.35.2
    kustomize:
        version: 5.8.1
    krew:
        version: 0.5.0
        plugins:
            - ns
    helm:
        version: 4.1.1
        plugins:
            - url: https://github.com/databus23/helm-diff
              version: 3.15.2
              verify: false
    helmfile:
        version: 1.4.1
    k9s:
        version: 0.50.18
    stern:
        version: 1.33.1
    popeye:
        version: 0.22.1
    vault:
        version: 1.21.2
    rclone:
        version: 1.73.1
    openstack:
        version: 9.0.0
    swift:
        version: 4.10.0
        keystone:
            version: 5.8.0
    scw:
        version: 2.52.0
    sops:
        version: 3.12.1
    aws:
        version: 2.34.1
        config: |
            [profile test]
    gcloud:
        version: 559.0.0
        components:
            - gke-gcloud-auth-plugin
    age:
        version: 1.3.1
    argocd:
        version: 3.3.2
